<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">

<title>¿Me perdonas?</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(180deg,#ffd5e5,#ffeef4);

}

/* Corazones */

.heart{

position:absolute;

color:#ff4d79;

user-select:none;

pointer-events:none;

animation:fall linear forwards;

}

@keyframes fall{

0%{

transform:translateY(-120px) rotate(0deg);

opacity:1;

}

100%{

transform:translateY(120vh) rotate(360deg);

opacity:0;

}

}

.card{

width:500px;

padding:45px;

background:rgba(255,255,255,.88);

border-radius:30px;

box-shadow:0 15px 40px rgba(0,0,0,.18);

backdrop-filter:blur(10px);

text-align:center;

position:relative;

z-index:20;

}

.icon{

font-size:70px;

animation:beat 1s infinite;

}

@keyframes beat{

50%{

transform:scale(1.2);

}

}

h1{

font-size:55px;

margin-top:15px;

color:#b31245;

}

p{

margin-top:18px;

font-size:22px;

color:#555;

}

.buttons{

margin-top:45px;

display:flex;

justify-content:center;

gap:35px;

}

button{

width:150px;

height:60px;

border:none;

border-radius:40px;

font-size:25px;

cursor:pointer;

transition:.3s;

}

#yes{

background:#ff4d79;

color:white;

box-shadow:0 10px 20px rgba(255,77,121,.35);

}

#yes:hover{

transform:scale(1.08);

}

#no{

background:white;

border:3px solid #ff4d79;

color:#ff4d79;

position:relative;

}

.note{

margin-top:30px;

color:#cc4b74;

font-size:18px;

}

</style>

</head>

<body>

<div class="card">

<div class="icon">❤️</div>

<h1>¿Me perdonas?</h1>

<p>

Eres muy importante para mí.

</p>

<div class="buttons">

<button id="yes">Sí ❤️</button>

<button id="no">No</button>

</div>

<div class="note">

💕 Elige con el corazón 💕

</div>

</div>

<script>

const noBtn=document.getElementById("no");

const yesBtn=document.getElementById("yes");

function moveButton(){

const x=Math.random()*(window.innerWidth-180);

const y=Math.random()*(window.innerHeight-80);

noBtn.style.position="fixed";

noBtn.style.left=x+"px";

noBtn.style.top=y+"px";

}

noBtn.addEventListener("mouseenter",moveButton);

noBtn.addEventListener("click",moveButton);

yesBtn.addEventListener("click",()=>{

window.location.href="http://127.0.0.1:5500/mi_vida.html";

});

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML=["❤️","💖","💕","💗","💘"][Math.floor(Math.random()*5)];

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(Math.random()*25+15)+"px";

heart.style.animationDuration=(Math.random()*4+4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},8000);

}

setInterval(createHeart,120);

</script>

</body>
</html>
